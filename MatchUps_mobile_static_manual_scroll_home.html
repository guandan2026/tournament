<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes" />
  <title>对阵信息展示（手动滑动版）</title>
  <style>
    :root{
      --duration-sec: 180s;
      --font-base: clamp(16px, 1.6vw, 22px);
      --font-header: clamp(18px, 1.8vw, 26px);
      --row-pad: 10px;
      --banner-h: 100px;
      --viewport-h: 600px;
    }
    html { touch-action:auto; }
    body {
      font-family: Arial, sans-serif;
      background:#000;
      color:#fff;
      margin:0;
      padding:20px;
      overflow-x:hidden;
      -webkit-text-size-adjust:100%;
    }
    #banner { display:block; margin:0 auto 8px; max-width:100%; height:var(--banner-h); object-fit:contain; }
    h1 { text-align:center; color:#00ffcc; font-size:var(--font-header); margin:6px 0 12px; }

    .status { position:fixed; top:12px; right:12px; display:flex; gap:8px; align-items:center; font-size:.9em; }
    .dot { width:10px; height:10px; border-radius:50%; background:#555; }
    .dot.ok { background:#22c55e; } .dot.err { background:#ef4444; }
    .status small { opacity:.8 }

    .fixed-header table{ width:100%; table-layout:fixed; border-collapse:collapse; font-size:var(--font-base); }
    .fixed-header th{ padding:8px; background:#222; border-bottom:2px solid #00ffcc; text-align:center;
                      white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

    .scroll-viewport{
      height:var(--viewport-h);
      overflow-y:auto;
      overflow-x:hidden;
      position:relative;
      -webkit-overflow-scrolling:touch;
    }
    .scroller{
      position:static;
      left:auto;
      right:auto;
      top:auto;
      will-change:auto;
      animation:none;
    }

    table.live{ width:100%; table-layout:fixed; border-collapse:collapse; font-size:var(--font-base); }
    td{ padding:var(--row-pad); text-align:center; border-bottom:1px solid #333;
        white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    tr:nth-child(even){ background:#121212; } tr:nth-child(odd){ background:#0b0b0b; }

    .toolbar{ text-align:center; font-size:.95em; opacity:.85; }
    .tap-hint{ text-align:center; font-size:.9em; opacity:.75; margin-top:6px; }

    @media (max-width: 768px){
      :root{
        --font-base: .78em;
        --font-header: 1.35em;
        --row-pad: 5px 2px;
        --banner-h: 64px;
      }
      body{ padding:8px; overflow-x:hidden; }
      h1{ margin:4px 0 8px; }
      .status{ position:static; justify-content:flex-end; margin-bottom:4px; }
      .fixed-header table, table.live{ width:100%; table-layout:fixed; }
      .fixed-header th{
        padding:5px 2px;
        white-space:normal;
        overflow-wrap:anywhere;
        text-overflow:clip;
      }
      td{
        padding:5px 2px;
        white-space:normal;
        overflow-wrap:anywhere;
        word-break:break-word;
        text-overflow:clip;
      }
      .scroll-viewport{
        height:calc(100vh - 185px);
        min-height:520px;
      }
      .tap-hint{ font-size:.85em; }

      th:nth-child(1), td:nth-child(1){ width:11%; }
      th:nth-child(2), td:nth-child(2){ width:14%; }
      th:nth-child(3), td:nth-child(3){ width:25%; }
      th:nth-child(4), td:nth-child(4){ width:7%; }
      th:nth-child(5), td:nth-child(5){ width:14%; }
      th:nth-child(6), td:nth-child(6){ width:29%; }
    }

    @media (orientation: landscape) and (max-height: 520px){
      body{ padding:8px; overflow-x:hidden; }
      #banner{ height:58px; }
      h1{ font-size:1.25em; margin:3px 0 6px; }
      .status{ position:static; justify-content:flex-end; margin-bottom:4px; }
      .fixed-header table, table.live{
        width:100%;
        table-layout:fixed;
        font-size:.82em;
      }
      .fixed-header th{
        padding:5px 2px;
        white-space:normal;
        overflow-wrap:anywhere;
        word-break:break-word;
        text-overflow:clip;
      }
      td{
        padding:5px 2px;
        white-space:normal;
        overflow-wrap:anywhere;
        word-break:break-word;
        text-overflow:clip;
      }
      .scroll-viewport{
        height:calc(100vh - 155px);
        min-height:260px;
      }

      /* Landscape phone column proportions */
      th:nth-child(1), td:nth-child(1){ width:10%; }
      th:nth-child(2), td:nth-child(2){ width:14%; }
      th:nth-child(3), td:nth-child(3){ width:26%; }
      th:nth-child(4), td:nth-child(4){ width:7%; }
      th:nth-child(5), td:nth-child(5){ width:14%; }
      th:nth-child(6), td:nth-child(6){ width:29%; }
    }


    .home-btn{
      position:fixed;
      left:10px;
      top:10px;
      z-index:9999;
      background:rgba(0,0,0,.72);
      color:#00ffcc;
      border:1px solid #00ffcc;
      padding:6px 10px;
      border-radius:8px;
      font-size:14px;
      font-weight:bold;
      text-decoration:none;
      cursor:pointer;
      line-height:1.2;
      box-shadow:0 2px 10px rgba(0,255,204,.18);
    }

    .home-btn:active{
      transform:scale(.96);
    }

    @media (max-width:768px){
      .home-btn{
        left:8px;
        top:8px;
        font-size:13px;
        padding:5px 9px;
      }
    }

  </style>
</head>
<body>
  <a class="home-btn" href="index.html">返回首页</a>
  <div class="status"><div id="netDot" class="dot"></div><small id="statusText">连接中…</small></div>

  <img id="banner" src="banner.png" alt="Banner" />
  <h1 id="roundTitle">加载中…</h1>

  <!-- 6列固定表头 -->
  <div class="fixed-header">
    <table><thead><tr id="theadRow">
      <th>桌号</th>
      <th>东/西ID</th>
      <th>东/西姓名</th>
      <th>VS</th>
      <th>南/北ID</th>
      <th>南/北姓名</th>
    </tr></thead></table>
  </div>

  <!-- 滚动主体：A/B 两份；不足一屏时在 A 内克隆补满，再镜像到 B -->
  <div class="scroll-viewport">
    <div id="scroller" class="scroller">
      <table class="live"><tbody id="tbodyA"></tbody></table>
    </div>
  </div>
  <div class="tap-hint">手动上下滑动查看全表；双指可放大缩小；数据会自动刷新</div>
<div class="toolbar">
    <span id="lastUpdate">上次更新：—</span>
  </div>

  <script>
    /* ===== API ===== */
    const MATCHUPS_API = "https://script.google.com/macros/s/AKfycby2yc88MjmKxpnXxmuefWjQt7QTuHZxKei5bBcIDS205SXIOchbTXbvyxcviq6Opk4/exec";

    /* ===== 速度参数 ===== */
    const POLL_MS = 10000;

    /* ===== 列索引（0起）：A C D (VS) G H ===== */
    const COL_INDEX = { table:0, p1Id:2, p1Nm:3, p2Id:6, p2Nm:7 };

    /* ===== DOM ===== */
    const url = new URL(location.href);
    const roundParamStr = url.searchParams.get("round");
    const roundParam = (roundParamStr && roundParamStr.trim() !== "") ? Number(roundParamStr) : NaN;
    let roundFromHeader = NaN;

    const netDot = document.getElementById("netDot");
    const statusText = document.getElementById("statusText");
    const lastUpdateEl = document.getElementById("lastUpdate");
    const tbodyA = document.getElementById("tbodyA");
    const tbodyB = null;
    const roundTitle = document.getElementById("roundTitle");
    const scroller = document.getElementById("scroller");
    const viewport = document.querySelector(".scroll-viewport");

    function adjustViewportHeight(){
      const vv = window.visualViewport;
      const h = vv ? vv.height : window.innerHeight;
      if (window.matchMedia("(max-width: 768px)").matches) {
        viewport.style.height = Math.max(420, Math.floor(h - 150)) + "px";
      }
    }
    window.addEventListener("resize", adjustViewportHeight);
    if (window.visualViewport) window.visualViewport.addEventListener("resize", adjustViewportHeight);

    let started = false;
    let pollTimer = null;

    const trim = v => (v==null ? "" : String(v).trim());
    function setNet(ok,msg){ netDot.className="dot "+(ok?"ok":"err"); statusText.textContent=msg||(ok?"在线":"重试中…"); }
    function ts(){ const d=new Date(); const p=n=>String(n).padStart(2,"0"); return `${p(d.getHours())}:${p(d.getMinutes())}:${p(d.getSeconds())}`; }

    async function fetchJSON(u, tries=3, baseDelay=1200){
      for(let i=0;i<tries;i++){
        try{
          const r = await fetch(u, {cache:"no-store"});
          if(!r.ok) throw new Error(String(r.status));
          setNet(true,"在线");
          return await r.json();
        }catch(e){
          setNet(false,`重试 ${i+1}/${tries}`);
          if(i===tries-1) throw e;
          await new Promise(res=>setTimeout(res, baseDelay*(i+1)));
        }
      }
    }

    /* 解析：剔除起始全空行；rows[0]=表头，rows[1..]=数据 */
    function parsePayload(payload){
      let rows = [];
      if (payload && Array.isArray(payload.rows)) rows = payload.rows;
      else if (payload && Array.isArray(payload.data)) rows = payload.data;
      else if (Array.isArray(payload)) rows = payload;
      else if (payload && Array.isArray(payload.table)) rows = payload.table;
      else rows = [];
      rows = rows.map(r => (Array.isArray(r) ? r.map(trim) : []));

      while (rows.length && rows[0].every(c => c === "")) rows.shift();
      if (!rows.length) return { header:[], rows:[] };
      return { header: rows[0], rows: rows.slice(1) };
    }

    /* 从表头解析“第N轮 / Round N / R N” */
    function extractRoundFromHeader(headerCells){
      for (const h of headerCells){
        const s = trim(h).replace(/\s+/g,'');
        if (!s) continue;
        let m = s.match(/^第(\d+)轮$/);                           if (m) return Number(m[1]);
        m = s.match(/(?:^|[^A-Za-z])Round(\d+)(?:[^A-Za-z]|$)/i); if (m) return Number(m[1]);
        m = s.match(/^R(\d+)$/i);                                 if (m) return Number(m[1]);
      }
      return NaN;
    }

    function updateTitle(){
      const useRound =
        (Number.isFinite(roundParam) && roundParam > 0) ? roundParam :
        (Number.isFinite(roundFromHeader) && roundFromHeader > 0) ? roundFromHeader :
        null;
      roundTitle.textContent = (useRound != null)
        ? `第 ${useRound} 轮对阵信息（手动查看）`
        : `对阵信息（手动查看）`;
    }

    /* 排序依据：桌号列（尽量按数字） */
    function parseTableNo(row){
      const raw = (row[COL_INDEX.table] ?? "").toString();
      const num = Number(raw.replace(/[^\d.-]/g,''));
      return Number.isFinite(num) ? num : raw;
    }

    function buildRow(row){
      const tr = document.createElement("tr");
      const id = [
        row[COL_INDEX.table], row[COL_INDEX.p1Id], row[COL_INDEX.p1Nm],
        row[COL_INDEX.p2Id], row[COL_INDEX.p2Nm]
      ].map(v=>trim(v)).join("|") || `${Date.now()}-${Math.random()}`;
      tr.dataset.id = id;

      const cells = [
        row[COL_INDEX.table],
        row[COL_INDEX.p1Id],
        row[COL_INDEX.p1Nm],
        "VS",
        row[COL_INDEX.p2Id],
        row[COL_INDEX.p2Nm]
      ];
      cells.forEach((v, idx)=>{
        const td = document.createElement("td");
        td.textContent = (v==null || v==="") ? "—" : String(v);
        td.dataset.col = String(idx);
        tr.appendChild(td);
      });
      return tr;
    }

    // 手动滑动版：不复制表格，不做镜像，不做自动滚动。
    function ensureFillAndMirror(){
      // no-op
    }

    function initialRender(header, rows){
      roundFromHeader = extractRoundFromHeader(header);
      updateTitle();

      rows.sort((a,b)=>{
        const A = parseTableNo(a), B = parseTableNo(b);
        if (typeof A === 'number' && typeof B === 'number') return A - B;
        return String(A).localeCompare(String(B));
      });

      tbodyA.innerHTML = "";
      rows.forEach(r => tbodyA.appendChild(buildRow(r)));
      ensureFillAndMirror();

      started = true;
      lastUpdateEl.textContent = `上次更新：${ts()}`;
    }

    // 行内补丁：后台刷新保留；用户手动滑动的位置尽量保持不变。
    function patchRows(header, rows){
      roundFromHeader = extractRoundFromHeader(header);
      updateTitle();

      rows.sort((a,b)=>{
        const A = parseTableNo(a), B = parseTableNo(b);
        if (typeof A === 'number' && typeof B === 'number') return A - B;
        return String(A).localeCompare(String(B));
      });

      const newIds = rows.map(r => [
        r[COL_INDEX.table], r[COL_INDEX.p1Id], r[COL_INDEX.p1Nm],
        r[COL_INDEX.p2Id], r[COL_INDEX.p2Nm]
      ].map(v=>trim(v)).join("|"));

      const oldIds = Array.from(tbodyA.querySelectorAll("tr")).map(tr => tr.dataset.id);
      const structureChanged = newIds.length !== oldIds.length || newIds.some((id, i) => id !== oldIds[i]);

      if (structureChanged) {
        const oldTop = viewport.scrollTop;
        tbodyA.innerHTML = "";
        rows.forEach(r => tbodyA.appendChild(buildRow(r)));
        viewport.scrollTop = oldTop;
      } else {
        rows.forEach(r=>{
          const id = [
            r[COL_INDEX.table], r[COL_INDEX.p1Id], r[COL_INDEX.p1Nm],
            r[COL_INDEX.p2Id], r[COL_INDEX.p2Nm]
          ].map(v=>trim(v)).join("|");

          const vals = [
            r[COL_INDEX.table],
            r[COL_INDEX.p1Id],
            r[COL_INDEX.p1Nm],
            "VS",
            r[COL_INDEX.p2Id],
            r[COL_INDEX.p2Nm]
          ].map(v => (v==null || v==="") ? "—" : String(v));

          document.querySelectorAll(`tr[data-id="${CSS.escape(id)}"]`).forEach(tr=>{
            vals.forEach((nv, i)=>{
              const td = tr.querySelector(`td[data-col="${i}"]`);
              if (td && td.textContent !== nv) td.textContent = nv;
            });
          });
        });
      }

      lastUpdateEl.textContent = `上次更新：${ts()}`;
    }

    async function loadAndPatch(){
      const payload = await fetchJSON(MATCHUPS_API);
      const parsed  = parsePayload(payload);
      if (!started) initialRender(parsed.header, parsed.rows);
      else          patchRows(parsed.header, parsed.rows);
    }

    function startPolling(){
      if (pollTimer) clearInterval(pollTimer);
      pollTimer = setInterval(async ()=>{
        try{ await loadAndPatch(); setNet(true,"在线"); }
        catch(e){ setNet(false,"重试中…"); }
      }, POLL_MS);
    }

    (async ()=>{
      adjustViewportHeight();
      try{ await loadAndPatch(); setNet(true,"在线"); }
      catch(e){ setNet(false,"初次加载失败"); }
      startPolling();
    })();
  </script>
</body>
</html>
